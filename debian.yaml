{{- $carrier := .carrier -}}
{{- $board := .board -}}
{{- $architecture := .architecture -}}
{{- $image := or .image (printf "debian-%s-%s.img" $carrier $board) -}}

architecture: {{ $architecture }}

actions:
  - action: debootstrap
    suite: "trixie"
    components:
      - main
      - non-free-firmware
    mirror: https://deb.debian.org/debian
    variant: minbase

  - action: apt
    packages: [udev, ca-certificates, coreutils, sudo, openssh-server, adduser, systemd, systemd-sysv, systemd-resolved, nano, vim, qrtr-tools, libqmi-utils, rmtfs, udev, kmod, network-manager, modemmanager, wpasupplicant, ifupdown, isc-dhcp-client, isc-dhcp-server, systemd-timesyncd, bluetooth, kpartx, cloud-utils, fake-hwclock, wireless-regdb, usbutils, iputils-ping]

  - action: run
    description: Add citronics APT repository
    chroot: true
    command: echo "deb [trusted=yes] https://citronics.github.io/deb-packages/ stable main" | tee /etc/apt/sources.list.d/citronics.list

  - action: apt
    packages: [initramfs-tools, citronics-{{ $carrier }}-{{ $board }}]

  - action: run
    chroot: true
    script: scripts/setup-user.sh

  - action: run
    chroot: true
    command: echo citronics > /etc/hostname

  - action: overlay
    source: overlays
    destination: /

  - action: overlay
    source: carriers/{{ $carrier }}/overlays
    destination: /

  - action: overlay
    source: boards/{{ $board }}/overlays
    destination: /

  - action: run
    chroot: true
    script: boards/{{ $board }}/scripts/setup-networking.sh

  - action: run
    chroot: true
    command: update-initramfs -c -k all

  - action: run
    chroot: true
    script: scripts/setup-boot.sh

  - action: image-partition
    imagename: {{ $image }}
    imagesize: 1500MB
    partitiontype: msdos
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot
        partition: boot
    partitions:
      - name: boot
        fs: ext2
        start: 0%
        end: 50MB
        flags: [ boot ]
      - name: root
        fs: ext4
        start: 50MB
        end: 100%

  - action: filesystem-deploy
    description: Deploying filesystem onto image
