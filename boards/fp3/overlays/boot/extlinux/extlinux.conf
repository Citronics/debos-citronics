timeout 1
default Citronics
menu title boot prev kernel

label Citronics
	kernel /Image.gz
	fdt /sdm632-fairphone-fp3.dtb
	initrd /initramfs.gz
	append earlycon console=ttyMSM0,115200 console=tty0 loglevel=8 fbcon=rotate:3 fbcon=font:TER16x32 rootfs=/dev/mmcblk0p62p2 bootpart=/dev/mmcblk0p62p1 resize_rootfs=1
