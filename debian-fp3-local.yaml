{{- $carrier := .carrier -}}
{{- $board := .board -}}
{{- $architecture := .architecture -}}
{{- $image := or .image (printf "debian-%s-%s.img" $carrier $board) -}}

architecture: {{ .architecture }}

actions:
  - action: debootstrap
    suite: "trixie"
    components:
      - main
      - non-free-firmware
    mirror: http://deb.debian.org/debian
    variant: minbase

  - action: run
    description: Enable non-free-firmware Debian repo
    chroot: true
    command: sed -i 's/^Components: main$/Components: main non-free-firmware/' /etc/apt/sources.list.d/debian.sources

  - action: apt
    packages: [ca-certificates, coreutils, sudo, openssh-server, adduser, systemd, systemd-sysv, systemd-resolved, nano, vim, qrtr-tools, libqmi-utils, rmtfs, udev, kmod, network-manager, modemmanager, wpasupplicant, ifupdown, isc-dhcp-client, isc-dhcp-server, systemd-timesyncd, bluetooth, kpartx, cloud-utils, fake-hwclock, wireless-regdb, usbutils, iputils-ping, initramfs-tools]

  - action: overlay
    description: Inject local .deb packages (common)
    source: local-debs/common
    destination: /tmp/local-debs

  - action: overlay
    description: Inject board-specific local .deb packages
    source: local-debs/{{ $board }}
    destination: /tmp/local-debs

  - action: run
    description: Install local citronics packages
    chroot: true
    command: dpkg -i --force-depends /tmp/local-debs/*.deb && rm -rf /tmp/local-debs

  - action: run
    chroot: true
    script: scripts/setup-user.sh

  - action: run
    chroot: true
    command: echo citronics > /etc/hostname

  - action: overlay
    source: overlays
    destination: /

  - action: overlay
    source: carriers/{{ $carrier }}/overlays
    destination: /

  - action: overlay
    source: boards/{{ $board }}/overlays
    destination: /

  - action: run
    chroot: true
    script: boards/{{ $board }}/scripts/setup-networking.sh

  - action: run
    chroot: true
    command: update-initramfs -c -k all

  - action: image-partition
    imagename: {{ $image }}
    imagesize: 750MB
    partitiontype: msdos
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot
        partition: boot
    partitions:
      - name: boot
        fs: ext2
        start: 0%
        end: 50MB
        flags: [ boot ]
      - name: root
        fs: ext4
        start: 50MB
        end: 100%

  - action: filesystem-deploy
    description: Deploying filesystem onto image
